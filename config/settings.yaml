data:
  application_train: "data/application_train.csv"
  bureau: "data/bureau.csv"
  previous_application: "data/previous_application.csv"
  target_column: "TARGET"

split:
  test_size: 0.10
  random_state: 42
  stratify: true

model:
  scoring_metric: "f1"
  cv_folds: 5
  optuna:
    n_trials: 30

mlflow:
  tracking_uri: "sqlite:///mlruns.db"
  experiment_name: "home-credit-risk-engine"
  tags:
    project: "loan-default-pipeline"
    dataset: "home-credit"
    framework: "xgboost"

outputs:
  directory: "outputs"
  model_filename: "model.joblib"
  shap_filename: "shap_summary.png"
  metrics_filename: "metrics.json"
